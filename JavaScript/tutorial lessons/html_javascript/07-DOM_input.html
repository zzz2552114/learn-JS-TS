<!DOCTYPE html>
<html>
    <head>
        <title>input-DOM</title>
        <script>
            function cal(){
                let price = document.querySelector("#price").value;
                price = Number(price);
                if(price < 50) price += 10;
                document.querySelector('#show').innerHTML = `$${price}`;
            }
            
            function entercal(event){
                if(event.key==='Enter') cal();
            }
        </script>
    </head>
    <body>
        <p>
            这里我们学input+DOM，另外还有事件监听。<br>
            实际上onclick就是一种事件监听，我们这里学另外一个onkeydown<br>
            这个是和input可以一起使用的
        </p>
        <p>
            Amazon Shipping Calculator<br>
            rules:<br>if cost<50 post-fee $10<br>
            else post-fee free
        </p>
        <input placeholder="the total price" id="price" onkeydown="entercal(event)"> 
        <!---
        这里的event也是一个object，有很多属性，比如key、code
        !--->
        <button onclick="cal()">calculate</button>
        <p id="show">

        </p>
    </body>
</html>
