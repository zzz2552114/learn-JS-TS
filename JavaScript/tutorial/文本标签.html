<!DOCTYPE html>
<html lang="cn">
    <head>
        <meta charset="utf-8">
        <title>常见文本标签</title>
    </head>
    <body>
        <h1>一级标题标签</h1>
        <h2>2title</h2>
        <p>thats a paragraph</p>
        <br>
        <br>
        <p>thats another</p>
        <ul>
            <li>the 1st line</li>
            <li>the 2nd line</li>
            <li>the 3rd line</li>
        </ul>
        <ol>
            <li>第一行</li>
            <li>第二行</li>
            <li>第三行</li>
        </ol>
        <table border="3">
            <tr>
                <th>第一列</th>
                <th>第二列</th>
                <th>第三列</th>

            </tr>
            <tr>
                <td>1.1</td>
                <td>1.2</td>
                <td>1.3</td>
                <td>1.4</td>
            </tr>
            <tr>
                <td>2.1</td>
                <td>2.2</td>
                <td>2.3</td>
            </tr>
        </table>
    </body>
</html>
